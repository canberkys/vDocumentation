name: CI

on:
  push:
    branches: [main, master, 'feature/**']
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path ./powershell/vDocumentation -Recurse -Settings PSGallery -ExcludeRule PSAvoidUsingConvertToSecureStringWithPlainText
          $results | Format-Table -AutoSize
          if ($results | Where-Object { $_.Severity -eq 'Error' }) {
            throw "PSScriptAnalyzer found errors"
          }

  test:
    name: Pester Tests (${{ matrix.os }})
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0
          Install-Module ImportExcel -Force -Scope CurrentUser
      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'testResults.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $config

  publish:
    name: Publish to PSGallery
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish Module
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Publish-Module -Path ./powershell/vDocumentation -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose
